<!DOCTYPE html>
<html lang="esp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="estilos/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <title>Login</title>
</head>
<body>
    <main>
        <section id="login">
            <div id="imagem">

            </div>
            <div id="formularios">
                <h1>Login</h1>
                <p class="formp">Seja muito bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
                <form action="login.php" method="post" autocomplete="on">

                     <p class="inpt">
                        <span class="material-symbols-outlined">
                        person
                        </span>
                        <input type="email" name="usu" id="iusu" placeholder="Seu e-mail" required minlength="8" maxlength="15" autocomplete="email">
                        <label for="iusu">E-mail</label>
                        
                    </p>
                    <p class="inpt">
                        <span class="material-symbols-outlined">
                        key
                        </span>
                        <input type="password" name="senha" id="isenha" placeholder="*****" required maxlength="30" minlength="15" autocomplete="current-password">
                        <label for="isenha">Senha</label>
                        
                    </p>
                    <input type="submit" value="entrar">
                    <a href="esquece.html" class="botao">Esqueceu a senha? <span class="material-symbols-outlined">mail</span></a>

                </form>
            </div>
        </section>
    </main>
</body>
</html>
